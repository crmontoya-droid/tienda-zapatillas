# CONFIGURACIÓN GENERAL
server:
  port: 8083

spring:
  application:
    name: ventas
  profiles:
    active: dev

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

---
# PERFIL DE DESARROLLO (dev)
spring:
  config:
    activate:
      on-profile: dev

  # Conexión a tu base de datos Laragon
  datasource:
    url: jdbc:mysql://localhost:3306/db_ventas?createDatabaseIfNotExist=true
    username: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true