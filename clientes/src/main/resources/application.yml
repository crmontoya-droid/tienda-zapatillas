# CONFIGURACIÓN GENERAL
server:
  port: 8081

spring:
  application:
    name: clientes
  profiles:
    active: dev

---
# PERFIL DE DESARROLLO (dev)
spring:
  config:
    activate:
      on-profile: dev

  # Conexión a tu base de datos Laragon
  datasource:
    url: jdbc:mysql://localhost:3306/db_clientes?createDatabaseIfNotExist=true
    username: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true