# CONFIGURACIÓN GENERAL
server:
  port: 8082

spring:
  application:
    name: productos
  profiles:
    active: dev

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

---
# PERFIL DE DESARROLLO (dev)
spring:
  config:
    activate:
      on-profile: dev
  
  # Conexión a tu base de datos Laragon
  datasource:
    url: jdbc:mysql://localhost:3306/db_productos?createDatabaseIfNotExist=true
    username: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true